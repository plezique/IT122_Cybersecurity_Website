<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CyberSafe Learn — Module details and quiz.">
    <title>Module | CyberSafe Learn</title>
    <script>
        (function () {
            var key = 'cybersafe-theme';
            var saved = localStorage.getItem(key);
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="module">
    <div id="site-header"></div>

    <main id="main-content">
        <div class="page-header">
            <div class="container" id="module-header"></div>
        </div>

        <section class="section">
            <div class="container" style="max-width: 800px;">
                <article class="module-content" id="module-content"></article>

                <div class="module-quiz-section" id="module-quiz">
                    <h2 class="section-title" id="module-quiz-title">Test Your Knowledge</h2>
                    <p class="text-muted">Answer these questions to reinforce what you learned in this module.</p>
                    <div id="module-quiz-area"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="assets/js/icons.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/quiz.js"></script>
    <script src="assets/js/pages.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
