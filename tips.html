<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CyberSafe Learn — Quick security tips cheat sheet.">
    <title>Quick Tips | CyberSafe Learn</title>
    <script>
        (function () {
            var key = 'cybersafe-theme';
            var saved = localStorage.getItem(key);
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="tips">
    <div id="site-header"></div>

    <main id="main-content">
        <div class="page-header">
            <div class="container">
                <span class="data-tag">Quick Reference</span>
                <h1 class="mt-2">Quick Tips &amp; Cheat Sheet</h1>
                <p>Bite-sized security advice you can scan in seconds. Bookmark this page for a quick refresher.</p>
            </div>
        </div>

        <section class="section">
            <div class="container" style="max-width: 800px;">
                <p class="text-muted mb-3">
                    <button onclick="window.print()" class="btn btn-outline btn-sm" id="print-btn">Print / Save as PDF</button>
                </p>
                <div id="tips-container"></div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="assets/js/icons.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/pages.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('print-btn');
            if (btn) btn.innerHTML = getIcon('print') + ' Print / Save as PDF';
        });
    </script>
</body>
</html>
